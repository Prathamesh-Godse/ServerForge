# ================================================================
# ServerForge — Kernel Hardening Configuration
# ================================================================
# Controls tunable kernel parameters written to:
#   /etc/sysctl.d/custom_overrides.conf
#
# Fixed security/performance values (IP spoofing, SYN flood,
# connection queues, socket buffers, file handles) are hardcoded
# in the script — they have no reason to vary between servers.
# Only the parameters that legitimately differ by hardware or
# use-case are exposed here.
# ================================================================

# ── Swap behaviour ───────────────────────────────────────────────
# How aggressively the kernel moves process memory to swap.
# Range: 0–100. Use 1 for servers (swap only as last resort).
# For ultra-fast NVMe-backed VPS a value of 5 is also acceptable.
SWAPPINESS=1

# How aggressively the kernel reclaims filesystem cache memory.
# Range: 0–500. 50 = hold cache in RAM twice as long as default.
VFS_CACHE_PRESSURE=50

# ── IPv6 ─────────────────────────────────────────────────────────
# Disable IPv6 at the kernel level via the GRUB boot parameter.
# Recommended for servers that serve only IPv4 traffic — reduces
# attack surface and simplifies firewall/Nginx/fail2ban config.
# Set to 'no' only if your server must serve IPv6 clients.
# Options: yes | no
DISABLE_IPV6=yes

# ── Apport crash reporter ─────────────────────────────────────────
# Apport is Ubuntu's crash reporting daemon. On a production server
# it has no value and can interfere with suid_dumpable=0 (it
# overrides it to 2 to collect crash dumps). Disable it.
# Options: yes | no
DISABLE_APPORT=yes
