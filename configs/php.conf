# ================================================================
# ServerForge — PHP Hardening & Optimization Configuration
# ================================================================
# Controls directives written to the server-wide PHP override file:
#   /etc/php/${PHP_VERSION}/fpm/conf.d/server_override.ini
#
# Also controls the PHP-FPM open file limit set in:
#   /etc/php/${PHP_VERSION}/fpm/php-fpm.conf
#
# PHP configuration hierarchy (highest precedence last):
#   php.ini  →  conf.d/server_override.ini  →  per-site pool config
#
# These are server-wide defaults. Per-site overrides (OPcache,
# disable_functions, allow_url_fopen, memory_limit) are applied
# inside each site's PHP-FPM pool config — covered in a later stage.
# ================================================================

# ── PHP version ──────────────────────────────────────────────────
# Must match PHP_VERSION in configs/lemp.conf.
PHP_VERSION=8.3

# ── Upload limits ────────────────────────────────────────────────
# Maximum size of a single uploaded file.
# Set high initially to allow WordPress theme and plugin uploads.
PHP_UPLOAD_MAX_FILESIZE=100M

# Maximum size of the entire HTTP POST body (must exceed UPLOAD_MAX).
# The extra headroom (100M upload → 125M post) accounts for
# multipart form data overhead.
PHP_POST_MAX_SIZE=125M

# ── Input variables ──────────────────────────────────────────────
# Maximum number of POST/GET/cookie variables processed per request.
# Default (1000) silently truncates data on complex WordPress admin
# pages with many menu items or large option sets.
PHP_MAX_INPUT_VARS=3000

# ── Memory limit ─────────────────────────────────────────────────
# Maximum memory a single PHP process may consume.
# 256M is appropriate for typical WordPress plugin workloads.
# Also set define('WP_MEMORY_LIMIT', '256M') in each wp-config.php.
PHP_MEMORY_LIMIT=256M

# ── PHP-FPM open file limit ──────────────────────────────────────
# Maximum open file descriptors for PHP-FPM master and worker processes.
# Set in php-fpm.conf via rlimit_files. Requires a full FPM restart
# (not just reload) to take effect after changing.
PHP_RLIMIT_FILES=32768
