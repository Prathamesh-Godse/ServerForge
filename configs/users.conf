# ================================================================
# ServerForge — User Management Configuration
# ================================================================
# Controls: non-root user creation, default user removal,
#           sudo access, and SSH public key injection.
# ================================================================

# ── Primary non-root user ────────────────────────────────────────
# The username to create for all ongoing server administration.
# This must match SERVER_USER in configs/server.conf exactly.
# Do NOT use 'root'.
# Example: andrew, deploy, admin
SERVER_USER="ubuntu"

# Password for the new user.
# Use a strong password (12+ chars, mixed case, numbers, symbols).
# This is set non-interactively via chpasswd.
USER_PASSWORD="ubuntu"

# ── Default cloud users to remove ───────────────────────────────
# Space-separated list of pre-created cloud provider accounts to
# delete. These vary by provider:
#   Vultr:        ubuntu, linuxuser
#   DigitalOcean: ubuntu
#   AWS EC2:      ubuntu, ec2-user
#   Hetzner:      (usually none)
# Leave empty ("") to skip user removal.
REMOVE_USERS=""

# ── SSH public key (optional but strongly recommended) ───────────
# Paste your RSA/ED25519 public key here (the contents of your
# local ~/.ssh/<keyname>.pub file).
# This is injected into ~/.ssh/authorized_keys for the new user,
# enabling key-based login immediately after ssh_hardening runs.
# Leave empty ("") to skip — you can add the key manually later.
# Example:
#   SSH_PUBLIC_KEY="ssh-rsa AAAAB3Nza... user@machine"
SSH_PUBLIC_KEY=""
