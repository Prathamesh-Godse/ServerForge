# ================================================================
# ServerForge — LEMP Stack Installation Configuration
# ================================================================
# Controls which versions and PPAs are used when installing
# Nginx, MariaDB, and PHP.
#
# Repository strategy:
#   Nginx  → Ondrej Surý PPA  (upstream version, HTTP/3 support)
#   PHP    → Ondrej Surý PPA  (multi-version coinstallation support)
#   MariaDB → Official Ubuntu repos (version is sufficient)
# ================================================================

# ── Nginx ────────────────────────────────────────────────────────
# The Ondrej Nginx PPA. Changed from nginx-mainline to nginx
# in April 2025 — use the current name below.
NGINX_PPA="ppa:ondrej/nginx"

# ── PHP ──────────────────────────────────────────────────────────
# PHP version to install. Must match a version available in the
# Ondrej PHP PPA (e.g. 8.3, 8.4).
PHP_VERSION="8.3"

# PHP PPA — do not change unless the PPA location moves.
PHP_PPA="ppa:ondrej/php"

# ── PHP extensions ───────────────────────────────────────────────
# Space-separated list of php${PHP_VERSION}-* extensions to install.
# The script prepends "php${PHP_VERSION}-" to each name automatically.
# Do not add "php8.3-" prefixes here — just the extension name.
PHP_EXTENSIONS="fpm gd mbstring mysql xml xmlrpc opcache cli zip soap intl bcmath curl imagick ssh2"

# ── Nginx modules ────────────────────────────────────────────────
# Additional Nginx modules to install alongside the core package.
# These are required for cache purging, custom headers, and
# Brotli compression (referenced in the nginx hardening stage).
# Separate with spaces — do not modify unless a module is unavailable.
NGINX_MODULES="libnginx-mod-http-cache-purge libnginx-mod-http-headers-more-filter libnginx-mod-http-brotli-filter libnginx-mod-http-brotli-static"
