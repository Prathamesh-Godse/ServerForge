# ================================================================
# ServerForge — Nginx Hardening & Optimization Configuration
# ================================================================
# Controls tunable Nginx parameters written to /etc/nginx/nginx.conf.
#
# All include file contents (basic_settings, buffers, timeouts,
# gzip, brotli, file_handle_cache) are hardcoded in the script —
# they are production-tested values with no sensible variation
# between servers of this type.
#
# Only the parameters that meaningfully differ by server capacity
# or use-case are exposed here.
# ================================================================

# ── Open file descriptor limit ───────────────────────────────────
# Maximum open file descriptors per Nginx worker process.
# Must be higher than WORKER_CONNECTIONS — each connection can
# consume multiple fds (socket + static files + log + cache).
# Formula: at minimum (WORKER_CONNECTIONS × 10) + overhead.
# Default: 45000 (fits worker_connections=4096 with overhead).
NGINX_WORKER_RLIMIT_NOFILE=45000

# ── Worker connections ───────────────────────────────────────────
# Maximum simultaneous connections per worker process.
# Total server capacity = worker_processes (auto) × WORKER_CONNECTIONS.
# Default: 4096 — appropriate for a 1-2 GB VPS.
NGINX_WORKER_CONNECTIONS=4096

# ── Client max body size ──────────────────────────────────────────
# Maximum allowed HTTP request body size.
# Set high during initial site setup to permit WordPress theme and
# plugin uploads. Reduce to 8m once the site is fully configured.
# Value: any valid Nginx size string (e.g. 100m, 8m, 50m).
NGINX_CLIENT_MAX_BODY_SIZE=100m
