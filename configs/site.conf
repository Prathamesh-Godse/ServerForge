# ================================================================
# ServerForge — Site Configuration
# ================================================================
# Controls per-site infrastructure: web root, Nginx server block,
# and WordPress installation.
#
# This config describes a SINGLE site. If hosting multiple sites,
# run Stages 17–18 separately for each by updating these values.
#
# DNS must be live and resolving to this server's IP before Stage 17
# runs — Nginx will accept traffic for SITE_DOMAIN after reload.
# ================================================================

# ── Domain ───────────────────────────────────────────────────────
# The site's domain name (bare domain, no www prefix).
# Used for:
#   - Web root path: /var/www/${SITE_DOMAIN}/public_html/
#   - Nginx server_name directive
#   - MariaDB database name (dots and dashes → underscores)
#   - Nginx and PHP log file naming
# Example: example.com, mysite.net
SITE_DOMAIN="example.com"

# ── PHP version ──────────────────────────────────────────────────
# Must match PHP_VERSION in configs/lemp.conf and the installed
# PHP-FPM socket at /run/php/php${SITE_PHP_VERSION}-fpm.sock.
# This will be updated to a site-specific socket when PHP-FPM pool
# isolation is configured (a later stage).
SITE_PHP_VERSION=8.3

# ── Permission mode ───────────────────────────────────────────────
# Controls how filesystem permissions are applied to the WordPress
# document root after pool isolation is set up (Stage 20).
#
#   standard — dirs 770, files 660
#              Used during active development and before WordPress
#              updates or plugin installs. Keeps everything writable.
#
#   hardened — core dirs 550, core files 440 (read-only)
#              wp-content dirs 770, wp-content files 660 (writable)
#              wp-config.php 440 (always)
#              For stable production sites. Prevents PHP from writing
#              to core directories even if a plugin is compromised.
#              WordPress core updates require temporarily reverting to
#              'standard', updating, then re-running Stage 20.
#
# Options: standard | hardened
PERMISSION_MODE=hardened

# ── Certbot email ─────────────────────────────────────────────────
# Email address for Let's Encrypt urgent renewal and security notices.
# This is NOT publicly visible — it is only used by the CA for
# critical communications (e.g. certificate expiry warnings).
# Required for non-interactive Certbot certificate issuance (Stage 21).
CERTBOT_EMAIL=""

# ── Hotlinking protection ─────────────────────────────────────────
# Controls whether image hotlinking protection is applied.
#
#   cloudflare — Recommended when Cloudflare is in front of the server.
#                Cloudflare intercepts hotlink attempts at the CDN edge
#                before they reach Nginx. Enable via:
#                  Cloudflare Dashboard → Domain → Scrape Shield →
#                  Hotlink Protection → ON
#                No Nginx config is added in this mode.
#
#   nginx      — Adds an Nginx location block with valid_referers checking.
#                WARNING: Does NOT work reliably with Cloudflare proxying
#                because Cloudflare's IPs appear as the referer, not the
#                external site. Only use this if Cloudflare proxy is OFF.
#
#   disabled   — No hotlinking protection configured.
#
# Options: cloudflare | nginx | disabled
HOTLINK_PROTECTION=cloudflare

# ── Database privilege hardening ──────────────────────────────────
# Controls whether Stage 23 restricts the WordPress database user to
# only SELECT, INSERT, UPDATE, DELETE (from ALL PRIVILEGES).
#
# ⚠  WARNING: Set to 'no' if the site runs WooCommerce. WooCommerce
#    needs CREATE, ALTER, and INDEX during plugin updates and order
#    processing. Applying this to a WooCommerce site WILL BREAK it.
#
# Options: yes | no
DB_PRIVILEGE_HARDEN=yes
