# ================================================================
# ServerForge — SSH Hardening Configuration
# ================================================================
# Controls: root login policy, password authentication,
#           and the SSH drop-in config file location.
# ================================================================

# ── Root login ───────────────────────────────────────────────────
# Whether to permit root login over SSH.
# Set to 'no' (strongly recommended) to block all root SSH access.
# Options: yes | no
PERMIT_ROOT_LOGIN=no

# ── Password authentication ──────────────────────────────────────
# Whether to allow password-based SSH login.
# Set to 'no' after confirming SSH key login works (recommended).
# Set to 'yes' if you are not using SSH keys.
# Options: yes | no
PASSWORD_AUTH=no

# ── Cloud-init drop-in config ────────────────────────────────────
# The SSH drop-in file used by cloud providers (Vultr, AWS, etc.)
# to inject their default SSH settings. This file takes precedence
# over the main sshd_config via the Include directive.
# Leave as default unless your provider uses a different filename.
SSH_DROPIN_FILE=/etc/ssh/sshd_config.d/50-cloud-init.conf
