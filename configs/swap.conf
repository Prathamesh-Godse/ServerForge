# ================================================================
# ServerForge — Swap File Configuration
# ================================================================
# Controls the size and location of the swap file created on the
# root filesystem. Swap acts as a RAM overflow safety net — it
# prevents the OOM killer from terminating processes during brief
# memory spikes.
#
# Recommended sizes:
#   1 GB RAM  → 2048 MB swap  (2 GB)
#   2 GB RAM  → 4096 MB swap  (4 GB)
#   4 GB RAM  → 4096 MB swap  (4 GB, diminishing returns beyond 1×)
#
# The script will skip creation if a swap file already exists at
# SWAP_PATH and is already registered in /etc/fstab.
# ================================================================

# ── Swap file path ───────────────────────────────────────────────
# Where the swap file will be created on the root filesystem.
# /swapfile is the Ubuntu convention — do not change unless needed.
SWAP_PATH=/swapfile

# ── Swap file size ───────────────────────────────────────────────
# Size in megabytes. Must be a positive integer.
# Formula: desired_GB × 1024  (e.g. 2 GB = 2048, 4 GB = 4096)
SWAP_SIZE_MB=2048
