# ================================================================
# ServerForge — Main Server Configuration
# ================================================================
# Edit ALL config files inside configs/ before running main.sh.
# This file controls: server identity, timezone, and fail2ban.
# ================================================================

# ── Identity ────────────────────────────────────────────────────
# Your Linux username on this server (do NOT use root).
# Must match SERVER_USER in configs/users.conf exactly.
# Used to locate the project directory and install the service.
# Example: ubuntu, admin, john
SERVER_USER=

# ── Timezone ────────────────────────────────────────────────────
# The timezone to apply to this server.
# To list available zones: timedatectl list-timezones | grep <Region>
# Example regions: Asia, America, Europe, Africa, Pacific
TIMEZONE=Asia/Kolkata

# ── Fail2ban ────────────────────────────────────────────────────
# Duration to ban an offending IP.
# Supported formats: 1h, 12h, 7d, 30d  (use -1 for permanent)
FAIL2BAN_BANTIME=7d

# Time window in which failed login attempts are counted.
FAIL2BAN_FINDTIME=3h

# Number of failures within FINDTIME before a ban is issued.
FAIL2BAN_MAXRETRY=3
