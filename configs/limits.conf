# ================================================================
# ServerForge — Open File Limits Configuration
# ================================================================
# Controls the system-wide open file descriptor limits written to:
#   /etc/security/limits.d/custom_directives.conf
#
# On Linux, every open network connection (socket) counts as an
# open file. The default soft limit of 1024 causes "too many open
# files" errors under any meaningful web server load.
#
# After this stage, each application (Nginx, PHP-FPM, MariaDB)
# will still need its own LimitNOFILE= set in its systemd service
# unit — the OS limit is the ceiling, but services must also be
# told to raise their own internal limit up to it.
# ================================================================

# ── Open file descriptor limit ───────────────────────────────────
# Applied to both hard and soft limits, for all users and root.
# 120000 is sufficient for a high-traffic single-site VPS.
# Increase to 500000+ for multi-site or very high traffic servers.
NOFILE_LIMIT=120000
