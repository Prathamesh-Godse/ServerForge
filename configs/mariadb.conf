# ================================================================
# ServerForge — MariaDB Optimization Configuration
# ================================================================
# Controls performance tuning written to:
#   /etc/mysql/mariadb.conf.d/50-server.cnf
# and the systemd open file limit drop-in:
#   /etc/systemd/system/mariadb.service.d/limits.conf
#
# InnoDB sizing rules of thumb:
#   innodb_buffer_pool_size = ~80% of total RAM
#   innodb_log_file_size    = ~25% of innodb_buffer_pool_size
#
# Examples by server RAM:
#   1 GB RAM → buffer: 800M,  log: 200M
#   2 GB RAM → buffer: 1600M, log: 400M
#   4 GB RAM → buffer: 3200M, log: 800M
#
# ⚠  The script stops MariaDB before changing innodb_log_file_size
#    and starts it again after — do NOT set this while MariaDB is
#    handling live traffic without a maintenance window.
# ================================================================

# ── InnoDB Buffer Pool ───────────────────────────────────────────
# Amount of RAM InnoDB uses to cache table data and indexes.
# More RAM here = fewer disk reads = faster queries.
MARIADB_INNODB_BUFFER_POOL_SIZE=800M

# ── InnoDB Redo Log File Size ────────────────────────────────────
# Size of the InnoDB transaction (redo) log. Larger = better write
# throughput and crash recovery, but longer recovery time after crash.
MARIADB_INNODB_LOG_FILE_SIZE=200M

# ── Binary Log Retention ─────────────────────────────────────────
# Days to keep binary logs before automatic purge.
# Default (10) can fill disk on a small VPS. 3 days is sufficient
# for a single-instance WordPress server with no replication.
MARIADB_EXPIRE_LOGS_DAYS=3

# ── Open File Limit ──────────────────────────────────────────────
# Maximum open file descriptors for the MariaDB systemd service.
# Written to /etc/systemd/system/mariadb.service.d/limits.conf.
# Default is 32768; 40000 provides headroom on a busy server.
MARIADB_OPEN_FILE_LIMIT=40000
