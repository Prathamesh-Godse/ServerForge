# ================================================================
# ServerForge — Firewall Configuration
# ================================================================
# Controls UFW rules applied during the Firewall stage.
# Services can be specified by name (ssh, http, https) or by
# port number. For protocol-specific rules use: 443/tcp or 443/udp.
# ================================================================

# ── Ports / services to ALLOW (comma-separated) ──────────────────
# Always include ssh — removing it will lock you out of the server.
ALLOW=ssh,http,https/tcp,https/udp

# ── Ports to explicitly DENY (comma-separated) ───────────────────
# Common insecure services: 21 (FTP), 23 (Telnet)
DENY=21,23

# ── Default policies ─────────────────────────────────────────────
DEFAULT_INCOMING=deny
DEFAULT_OUTGOING=allow

# ── ICMP ping ────────────────────────────────────────────────────
# Allow or block ping (ICMP) requests to this server.
# Options: yes | no
ALLOW_PING=yes
