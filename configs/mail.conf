# ================================================================
# ServerForge — Mail Configuration (msmtp)
# ================================================================
# Configures msmtp to relay outbound mail through an external SMTP
# server. The default is Gmail's SMTP relay, which is free, reliable,
# and keeps mail out of spam without running a full MTA.
#
# Gmail App Password setup (required — plain passwords are rejected):
#   1. Go to https://myaccount.google.com/
#   2. Security → 2-Step Verification (must be enabled)
#   3. App passwords → create new → copy the 16-character password
#
# Limits (Gmail free tier):
#   - Up to 100 recipients per message
#   - Up to 100 emails per day
#
# To use a different provider (smtp2go, Sendgrid, Mailgun):
#   Update SMTP_HOST, SMTP_PORT, SMTP_USER, and SMTP_PASSWORD below.
# ================================================================

# ── SMTP credentials ─────────────────────────────────────────────
# SMTP relay host and port.
SMTP_HOST=smtp.gmail.com
SMTP_PORT=587

# Your Gmail address (used for both authentication and the From field).
# For a branded sender address (mail@yourdomain.com), use a third-party
# transactional mail provider and update all four fields accordingly.
SMTP_USER=""

# The 16-character App Password generated in Google Account settings.
# Do NOT use your regular Gmail password — it will not work.
SMTP_PASSWORD=""

# The From address stamped on outbound email.
# Must match SMTP_USER when using Gmail.
SMTP_FROM=""
